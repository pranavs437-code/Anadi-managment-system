<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Anadi Aashram Dairy - Management System</title>
    
    <link rel="icon" type="image/png" href="https://anadisevaprakalp.org/wp-content/uploads/elementor/thumbs/anadi-farm-logo-2nd-copy-png-f-pf3gkbrok4it2hn25dsym3ek5sdjquv18uov85lvww.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.29/jspdf.plugin.autotable.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { brand: '#ea580c', brandDark: '#c2410c', navy: '#0f172a', surface: '#f8fafc' }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; background-color: #f1f5f9; }
        .card { background: white; border-radius: 1rem; border: 1px solid #e2e8f0; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
        .input-field { width: 100%; background-color: #f1f5f9; border: 2px solid transparent; border-radius: 0.75rem; padding: 0.75rem; font-weight: 700; color: #1e293b; outline: none; }
        .input-field:focus { border-color: #ea580c; background-color: white; }
        .excel-table { border-collapse: collapse; width: 100%; font-size: 11px; }
        .excel-table th { background: #f8fafc; color: #475569; padding: 12px 6px; border: 1px solid #e2e8f0; text-transform: uppercase; font-weight: 800; }
        .excel-table td { padding: 8px 6px; border: 1px solid #e2e8f0; text-align: center; font-weight: 600; color: #334155; }
        .sidebar-item { display: flex; align-items: center; gap: 0.75rem; padding: 0.875rem 1rem; border-radius: 0.75rem; font-weight: 600; color: #94a3b8; transition: 0.2s; }
        .sidebar-item.active { background: #ea580c; color: white; }
        .mobile-nav-item { display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 10px; font-weight: 800; color: #94a3b8; }
        .mobile-nav-item.active { color: #ea580c; }
        .loader-spin { border: 3px solid #f3f3f3; border-top: 3px solid #ea580c; border-radius: 50%; width: 20px; height: 20px; animation: spin 0.8s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="h-screen flex overflow-hidden">

    <!-- TOAST CONTAINER -->
    <div id="toast-container" class="fixed top-6 left-1/2 -translate-x-1/2 flex flex-col gap-2 z-[9999]"></div>

    <!-- SIDEBAR (DESKTOP) -->
    <aside class="hidden md:flex flex-col w-72 bg-navy text-white p-6 flex-shrink-0">
        <div class="flex items-center gap-3 mb-10">
            <img src="https://anadisevaprakalp.org/wp-content/uploads/elementor/thumbs/anadi-farm-logo-2nd-copy-png-f-pf3gkbrok4it2hn25dsym3ek5sdjquv18uov85lvww.png" class="w-8 bg-white p-1 rounded">
            <h1 class="font-extrabold text-xl leading-none">Anadi Dairy</h1>
        </div>
        <nav class="flex-1 space-y-2">
            <button onclick="switchTab('record')" id="desk-tab-record" class="sidebar-item active w-full"><i class="fa-solid fa-pen-to-square"></i> <span>Daily Entry</span></button>
            <button onclick="switchTab('history')" id="desk-tab-history" class="sidebar-item w-full"><i class="fa-solid fa-clock-rotate-left"></i> <span>History Log</span></button>
        </nav>
    </aside>

    <!-- CONTENT -->
    <div class="flex-1 flex flex-col min-w-0 overflow-hidden">
        
        <!-- HEADER -->
        <header class="bg-white border-b h-20 flex items-center justify-between px-6 flex-shrink-0">
            <h2 id="page-title" class="font-bold text-slate-800 text-lg uppercase tracking-tight">Daily Processing</h2>
            <input type="date" id="process-date" class="bg-slate-100 border rounded-xl px-4 py-2 font-bold text-sm outline-none focus:ring-2 focus:ring-brand">
        </header>

        <main class="flex-1 overflow-y-auto p-4 md:p-8 space-y-8 no-scrollbar pb-24 md:pb-8">
            
            <!-- TAB 1: ENTRY FORM -->
            <section id="tab-record" class="max-w-6xl mx-auto space-y-6">
                <div class="flex bg-slate-200 p-1.5 rounded-2xl w-full md:w-fit">
                    <button onclick="setShift('morning')" id="btn-morning" class="flex-1 px-8 py-2.5 rounded-xl font-bold transition-all bg-white text-brand shadow-sm">Morning</button>
                    <button onclick="setShift('evening')" id="btn-evening" class="flex-1 px-8 py-2.5 rounded-xl font-bold transition-all text-slate-500">Evening</button>
                </div>

                <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                    <!-- Milk -->
                    <div class="card p-6 border-t-4 border-blue-500">
                        <h3 class="font-bold text-slate-500 uppercase text-[10px] tracking-widest mb-4">1. Milk Reception</h3>
                        <div class="space-y-4">
                            <div><label class="text-[10px] font-bold text-slate-400 uppercase">Received (L)</label><input type="number" id="milk-received" class="input-field" min="0"></div>
                            <div class="grid grid-cols-2 gap-3">
                                <div><label class="text-[10px] font-bold text-red-400 uppercase">Expense</label><input type="number" id="milk-expense" class="input-field" min="0"></div>
                                <div><label class="text-[10px] font-bold text-emerald-500 uppercase">Gaushala</label><input type="number" id="milk-gaushala" class="input-field" min="0"></div>
                            </div>
                            <div class="grid grid-cols-2 gap-3 pt-4 border-t border-dashed">
                                <div><label class="text-[10px] font-bold text-slate-400 uppercase">For Curd</label><input type="number" id="milk-to-curd" class="input-field" min="0"></div>
                                <div><label class="text-[10px] font-bold text-slate-400 uppercase">For Paneer</label><input type="number" id="milk-to-paneer" class="input-field" min="0"></div>
                            </div>
                        </div>
                    </div>
                    <!-- Products -->
                    <div class="card p-6 border-t-4 border-orange-500">
                        <h3 class="font-bold text-slate-500 uppercase text-[10px] tracking-widest mb-4">2. Daily Output</h3>
                        <div class="space-y-4">
                            <div class="grid grid-cols-2 gap-3">
                                <div><label class="text-[10px] font-bold text-slate-400 uppercase">Paneer Made</label><input type="number" id="paneer-made" class="input-field" min="0"></div>
                                <div><label class="text-[10px] font-bold text-slate-400 uppercase">Paneer Sold</label><input type="number" id="paneer-sold" class="input-field" min="0"></div>
                            </div>
                            <div class="grid grid-cols-2 gap-3">
                                <div><label class="text-[10px] font-bold text-slate-400 uppercase">Curd Made</label><input type="number" id="curd-made" class="input-field" min="0"></div>
                                <div><label class="text-[10px] font-bold text-slate-400 uppercase">Curd Sold</label><input type="number" id="curd-sold" class="input-field" min="0"></div>
                            </div>
                            <div class="pt-4 border-t border-dashed">
                                <label class="text-[10px] font-bold text-blue-500 uppercase">Curd Churned (Kg)</label><input type="number" id="curd-churned" class="input-field" min="0">
                            </div>
                        </div>
                    </div>
                    <!-- Processing -->
                    <div class="card p-6 border-t-4 border-amber-500">
                        <h3 class="font-bold text-slate-500 uppercase text-[10px] tracking-widest mb-4">3. Butter & Ghee</h3>
                        <div class="space-y-4">
                            <div class="grid grid-cols-2 gap-3">
                                <div><label class="text-[10px] font-bold text-slate-400 uppercase">White Butter</label><input type="number" id="butter-made" class="input-field" min="0"></div>
                                <div><label class="text-[10px] font-bold text-slate-400 uppercase">Butter Sold</label><input type="number" id="butter-sold" class="input-field" min="0"></div>
                            </div>
                            <div><label class="text-[10px] font-bold text-slate-400 uppercase">Chaach Made (L)</label><input type="number" id="chaach-made" class="input-field" min="0"></div>
                            <div class="pt-4 border-t border-dashed">
                                <label class="text-[10px] font-bold text-amber-600 uppercase">Ghee Produced (Kg)</label><input type="number" id="ghee-made" class="input-field" min="0">
                            </div>
                        </div>
                    </div>
                </div>
            </section>

            <!-- TAB 2: HISTORY -->
            <section id="tab-history" class="hidden max-w-[1400px] mx-auto space-y-6">
                <!-- MONTHLY CARDS -->
                <div id="monthly-stats-grid" class="flex gap-4 overflow-x-auto pb-4 no-scrollbar"></div>

                <!-- TABLE HEADER ACTIONS -->
                <div class="flex justify-between items-center bg-white p-4 rounded-2xl border shadow-sm">
                    <div class="flex gap-2">
                        <button onclick="deleteSelected()" class="bg-red-50 text-red-600 px-4 py-2 rounded-xl text-xs font-black hover:bg-red-600 hover:text-white transition-all flex items-center gap-2">
                            <i class="fa-solid fa-trash-can"></i> DELETE SELECTED
                        </button>
                    </div>
                    <button onclick="downloadHistoryPDF()" class="bg-slate-800 text-white px-6 py-2 rounded-xl text-xs font-bold flex items-center gap-2">
                        <i class="fa-solid fa-file-pdf"></i> PDF REPORT
                    </button>
                </div>

                <div class="card overflow-hidden">
                    <div class="overflow-x-auto">
                        <table class="excel-table">
                            <thead>
                                <tr>
                                    <th class="sticky left-0 bg-slate-100 border-r-2 z-10 w-10">
                                        <input type="checkbox" id="select-all" onclick="toggleAll(this)" class="w-4 h-4 rounded">
                                    </th>
                                    <th class="sticky left-10 bg-slate-100 border-r-2 z-10">Date</th>
                                    <th>Morn</th><th>Eve</th><th>Exp</th><th>Gau</th>
                                    <th class="bg-blue-600 text-white">Net</th>
                                    <th>C-Made</th><th>C-Sold</th>
                                    <th>P-Made</th><th>P-Sold</th>
                                    <th>W-Butt</th><th>B-Sold</th>
                                    <th class="bg-emerald-600 text-white font-black">Bal</th>
                                    <th>Chaach</th><th>Ghee</th>
                                </tr>
                            </thead>
                            <tbody id="excel-body" class="bg-white"></tbody>
                        </table>
                    </div>
                </div>
            </section>
        </main>

        <!-- SAVE BUTTON (ENTRY) -->
        <div id="bottom-save-container" class="fixed bottom-24 md:bottom-10 right-6 z-40">
            <button onclick="saveData()" class="bg-brand text-white px-10 py-4 rounded-2xl font-black shadow-2xl hover:scale-105 active:scale-95 transition-all flex items-center gap-3">
                <i class="fa-solid fa-cloud-arrow-up"></i> SAVE SHIFT DATA
            </button>
        </div>

        <!-- MOBILE NAV -->
        <nav class="md:hidden fixed bottom-0 left-0 right-0 bg-white border-t h-20 flex items-center justify-around px-6 z-50">
            <button onclick="switchTab('record')" id="mob-tab-record" class="mobile-nav-item active">
                <i class="fa-solid fa-pen-to-square text-xl mb-1"></i> <span>ENTRY</span>
            </button>
            <button onclick="switchTab('history')" id="mob-tab-history" class="mobile-nav-item">
                <i class="fa-solid fa-clock-rotate-left text-xl mb-1"></i> <span>HISTORY</span>
            </button>
        </nav>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-app.js";
        import { getDatabase, ref, onValue, update, remove } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-database.js";

        const firebaseConfig = { databaseURL: "https://anadi-aashram-managment-default-rtdb.asia-southeast1.firebasedatabase.app" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let currentShift = 'morning';

        window.showToast = (msg, type = 'success') => {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `px-6 py-3 rounded-xl text-white font-bold shadow-xl flex items-center gap-3 ${type === 'success' ? 'bg-emerald-600' : 'bg-red-600'}`;
            toast.innerHTML = `<i class="fa-solid ${type === 'success' ? 'fa-check-circle' : 'fa-triangle-exclamation'}"></i> ${msg}`;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        };

        window.switchTab = (tab) => {
            document.getElementById('tab-record').classList.toggle('hidden', tab !== 'record');
            document.getElementById('tab-history').classList.toggle('hidden', tab !== 'history');
            document.getElementById('bottom-save-container').classList.toggle('hidden', tab !== 'record');
            
            ['record', 'history'].forEach(t => {
                document.getElementById(`desk-tab-${t}`).classList.toggle('active', t === tab);
                document.getElementById(`mob-tab-${t}`).classList.toggle('active', t === tab);
            });
            document.getElementById('page-title').innerText = tab === 'record' ? 'Daily Processing' : 'History Log';
            if(tab === 'history') loadHistory();
        };

        window.setShift = (shift) => {
            currentShift = shift;
            document.getElementById('btn-morning').className = shift === 'morning' ? 'flex-1 px-8 py-2.5 rounded-xl font-bold transition-all bg-white text-brand shadow-sm' : 'flex-1 px-8 py-2.5 rounded-xl font-bold transition-all text-slate-500';
            document.getElementById('btn-evening').className = shift === 'evening' ? 'flex-1 px-8 py-2.5 rounded-xl font-bold transition-all bg-white text-brand shadow-sm' : 'flex-1 px-8 py-2.5 rounded-xl font-bold transition-all text-slate-500';
            loadData();
        };

        const getVal = id => {
            const v = parseFloat(document.getElementById(id).value) || 0;
            return v < 0 ? 0 : v;
        };

        window.loadData = () => {
            const date = document.getElementById('process-date').value;
            onValue(ref(db, `aashram_dairy/${date}/${currentShift}`), snap => {
                const d = snap.val() || {};
                const fields = ['milk-received','milk-expense','milk-gaushala','milk-to-curd','milk-to-paneer','paneer-made','paneer-sold','curd-made','curd-sold','curd-churned','butter-made','butter-sold','chaach-made','ghee-made'];
                fields.forEach(f => {
                    const keys = f.split('-');
                    document.getElementById(f).value = d[keys[0]]?.[keys[1]] || '';
                });
            }, { onlyOnce: true });
        };

        window.saveData = () => {
            const date = document.getElementById('process-date').value;
            const data = {
                milk: { received: getVal('milk-received'), expense: getVal('milk-expense'), gaushala: getVal('milk-gaushala'), to_curd: getVal('milk-to-curd'), to_paneer: getVal('milk-to-paneer') },
                paneer: { made: getVal('paneer-made'), sold: getVal('paneer-sold') },
                curd: { made: getVal('curd-made'), sold: getVal('curd-sold') },
                processing: { curd_churned: getVal('curd-churned') },
                butter: { made: getVal('butter-made'), sold: getVal('butter-sold') },
                chaach: { made: getVal('chaach-made') },
                ghee: { made: getVal('ghee-made') }
            };
            update(ref(db, `aashram_dairy/${date}/${currentShift}`), data)
            .then(() => showToast("Shift Data Saved!"))
            .catch(e => showToast(e.message, 'error'));
        };

        // --- HISTORY LOGIC ---
        window.toggleAll = (master) => {
            const checkboxes = document.querySelectorAll('.row-checkbox');
            checkboxes.forEach(cb => cb.checked = master.checked);
        };

        window.deleteSelected = () => {
            const selected = Array.from(document.querySelectorAll('.row-checkbox:checked')).map(cb => cb.value);
            if (selected.length === 0) return showToast("Select records to delete", "error");

            if (confirm(`Delete ${selected.length} days of data permanently?`)) {
                const promises = selected.map(date => remove(ref(db, `aashram_dairy/${date}`)));
                Promise.all(promises).then(() => {
                    showToast("Selected Records Deleted");
                    loadHistory();
                    document.getElementById('select-all').checked = false;
                });
            }
        };

        window.loadHistory = () => {
            const tbody = document.getElementById('excel-body');
            const statsGrid = document.getElementById('monthly-stats-grid');
            onValue(ref(db, 'aashram_dairy'), snap => {
                const history = snap.val() || {};
                tbody.innerHTML = '';
                statsGrid.innerHTML = '';
                const monthlyAggr = {};
                const dates = Object.keys(history).sort().reverse();

                dates.forEach(date => {
                    const monthKey = date.substring(0, 7);
                    if(!monthlyAggr[monthKey]) monthlyAggr[monthKey] = { butterM: 0, butterS: 0, ghee: 0 };

                    const d = history[date];
                    const m = d.morning || {}; const e = d.evening || {};
                    const netMilk = (parseFloat(m.milk?.received||0)+parseFloat(e.milk?.received||0)) - 
                                    (parseFloat(m.milk?.expense||0)+parseFloat(e.milk?.expense||0)) - 
                                    (parseFloat(m.milk?.gaushala||0)+parseFloat(e.milk?.gaushala||0));
                    
                    const bMade = parseFloat(m.butter?.made||0) + parseFloat(e.butter?.made||0);
                    const bSold = parseFloat(m.butter?.sold||0) + parseFloat(e.butter?.sold||0);
                    const gMade = parseFloat(m.ghee?.made||0) + parseFloat(e.ghee?.made||0);

                    monthlyAggr[monthKey].butterM += bMade; monthlyAggr[monthKey].butterS += bSold;
                    monthlyAggr[monthKey].ghee += gMade;

                    tbody.innerHTML += `
                        <tr class="hover:bg-orange-50/50">
                            <td class="sticky left-0 bg-slate-100 border-r-2"><input type="checkbox" class="row-checkbox w-4 h-4" value="${date}"></td>
                            <td class="sticky left-10 bg-slate-100 font-black border-r-2">${date.split('-').reverse().slice(0,2).join('/')}</td>
                            <td>${m.milk?.received||'-'}</td><td>${e.milk?.received||'-'}</td>
                            <td>${(parseFloat(m.milk?.expense||0)+parseFloat(e.milk?.expense||0))||'-'}</td>
                            <td>${(parseFloat(m.milk?.gaushala||0)+parseFloat(e.milk?.gaushala||0))||'-'}</td>
                            <td class="bg-blue-50 font-bold text-blue-700">${netMilk.toFixed(1)}</td>
                            <td>${(parseFloat(m.curd?.made||0)+parseFloat(e.curd?.made||0))||'-'}</td>
                            <td>${(parseFloat(m.curd?.sold||0)+parseFloat(e.curd?.sold||0))||'-'}</td>
                            <td>${(parseFloat(m.paneer?.made||0)+parseFloat(e.paneer?.made||0))||'-'}</td>
                            <td>${(parseFloat(m.paneer?.sold||0)+parseFloat(e.paneer?.sold||0))||'-'}</td>
                            <td>${bMade||'-'}</td><td>${bSold||'-'}</td>
                            <td class="bg-emerald-50 font-black text-emerald-700">${(bMade-bSold).toFixed(1)}</td>
                            <td>${(parseFloat(m.chaach?.made||0)+parseFloat(e.chaach?.made||0))||'-'}</td>
                            <td>${gMade||'-'}</td>
                        </tr>`;
                });

                Object.keys(monthlyAggr).sort().reverse().forEach(m => {
                    const data = monthlyAggr[m];
                    const dateName = new Date(m + "-01").toLocaleString('default', { month: 'long', year: 'numeric' });
                    statsGrid.innerHTML += `
                        <div class="min-w-[240px] bg-navy text-white p-5 rounded-2xl shadow-xl border-b-8 border-brand">
                            <h4 class="text-[10px] font-black uppercase text-slate-500 mb-3">${dateName}</h4>
                            <div class="space-y-3">
                                <div><span class="text-[10px] text-slate-400 block">Total Ghee</span><span class="text-xl font-black text-amber-400">${data.ghee.toFixed(1)} Kg</span></div>
                                <div class="pt-2 border-t border-slate-700"><span class="text-[10px] text-brand block font-black">Butter Bal</span><span class="text-2xl font-black text-white">${(data.butterM - data.butterS).toFixed(1)} Kg</span></div>
                            </div>
                        </div>`;
                });
            });
        };

        window.downloadHistoryPDF = () => {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF('l', 'mm', 'a4');
            doc.text("Anadi Aashram Dairy Report", 14, 15);
            doc.autoTable({ html: '.excel-table', startY: 25, theme: 'grid', styles: {fontSize: 6} });
            doc.save("Dairy_Report.pdf");
        };

        window.addEventListener('DOMContentLoaded', () => {
            document.getElementById('process-date').valueAsDate = new Date();
            loadData();
        });
        document.getElementById('process-date').addEventListener('change', loadData);
    </script>
</body>
</html>
